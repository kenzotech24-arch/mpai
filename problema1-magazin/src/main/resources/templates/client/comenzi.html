<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Comenzile mele</title>
</head>
<body>
    <h2>Zona Client</h2>
    <a href="/home">Acasa</a>

    <br/><br/>
    <form method="get" action="/client">
        <input type="email" name="email" placeholder="Introduceti email-ul dvs." th:value="${email}"/>
        <button type="submit">Cauta comenzi</button>
    </form>

    <p th:if="${mesaj}" th:text="${mesaj}"></p>

    <div th:if="${email != null}">

        <div th:if="${notificari != null and !notificari.empty}">
            <h4>Notificari</h4>
            <ul>
                <li th:each="n : ${notificari}">
                    <span th:text="${n.mesaj}"></span> -
                    <small th:text="${n.data}"></small>
                </li>
            </ul>
        </div>

        <h4>Comenzile mele</h4>
        <table border="1">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Produse</th>
                    <th>Data</th>
                    <th>Status</th>
                    <th>Total</th>
                    <th>Actiune</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${comenzi}">
                    <td th:text="${c.id}"></td>
                    <td th:text="${c.produse}"></td>
                    <td th:text="${c.dataComanda}"></td>
                    <td th:text="${c.status}"></td>
                    <td th:text="${c.total} + ' RON'"></td>
                    <td>
                        <form th:if="${c.status.name() == 'PLASATA'}" method="post" th:action="@{/client/anuleaza/{id}(id=${c.id})}">
                            <input type="hidden" name="email" th:value="${email}"/>
                            <button type="submit">Anuleaza</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <h4>Plaseaza comanda noua</h4>
        <form method="post" action="/client/adauga">
            <input type="text" name="clientNume" placeholder="Numele dvs." required/>
            <br/>
            <input type="email" name="clientEmail" placeholder="Email" th:value="${email}" required/>
            <br/>
            <input type="text" name="produse" placeholder="Produse" required/>
            <br/>
            <input type="number" step="0.01" name="total" placeholder="Total (RON)" required/>
            <br/>
            <button type="submit">Plaseaza comanda</button>
        </form>

    </div>
</body>
</html>
