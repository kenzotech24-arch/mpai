<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Admin - Inchirieri</title>
</head>
<body>
    <h2>Administrator - Cereri Inchiriere</h2>
    <a href="/home">Acasa</a> |
    <a href="/admin/echipamente">Echipamente</a>

    <br/><br/>
    <p th:if="${mesaj}" th:text="${mesaj}"></p>

    <form method="get" action="/admin/inchirieri">
        <input type="email" name="email" placeholder="Filtreaza dupa email" th:value="${filterEmail}"/>
        <input type="text" name="echipament" placeholder="Filtreaza dupa echipament" th:value="${filterEchipament}"/>
        <select name="status">
            <option value="">Toate statusurile</option>
            <option th:each="s : ${statusuri}" th:value="${s}" th:text="${s}" th:selected="${s.name() == filterStatus}"></option>
        </select>
        <button type="submit">Filtreaza</button>
    </form>

    <br/>
    <table border="1">
        <thead>
            <tr>
                <th>#</th>
                <th>Utilizator</th>
                <th>Email</th>
                <th>Echipament</th>
                <th>De la</th>
                <th>Pana la</th>
                <th>Scop</th>
                <th>Status</th>
                <th>Schimba Status</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="i : ${inchirieri}">
                <td th:text="${i.id}"></td>
                <td th:text="${i.utilizatorNume}"></td>
                <td th:text="${i.utilizatorEmail}"></td>
                <td th:text="${i.echipamentNume}"></td>
                <td th:text="${i.dataStart}"></td>
                <td th:text="${i.dataFinal}"></td>
                <td th:text="${i.scop}"></td>
                <td th:text="${i.status}"></td>
                <td>
                    <form method="post" th:action="@{/admin/status/{id}(id=${i.id})}">
                        <select name="status">
                            <option th:each="s : ${statusuri}" th:value="${s}" th:text="${s}" th:selected="${s == i.status}"></option>
                        </select>
                        <button type="submit">OK</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
