<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Admin - Echipamente</title>
</head>
<body>
    <h2>Administrator - Echipamente</h2>
    <a href="/home">Acasa</a> |
    <a href="/admin/inchirieri">Cereri Inchiriere</a>

    <br/><br/>
    <p th:if="${mesaj}" th:text="${mesaj}"></p>

    <table border="1">
        <thead>
            <tr>
                <th>#</th>
                <th>Nume</th>
                <th>Descriere</th>
                <th>Disponibil</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="e : ${echipamente}">
                <td th:text="${e.id}"></td>
                <td th:text="${e.nume}"></td>
                <td th:text="${e.descriere}"></td>
                <td th:text="${e.disponibil} ? 'Da' : 'Nu'"></td>
            </tr>
        </tbody>
    </table>

    <br/>
    <h4>Adauga echipament nou</h4>
    <form method="post" action="/admin/echipamente/adauga">
        <input type="text" name="nume" placeholder="Nume echipament" required/>
        <br/>
        <input type="text" name="descriere" placeholder="Descriere" required/>
        <br/>
        Disponibil: <input type="checkbox" name="disponibil" value="true" checked/>
        <br/>
        <button type="submit">Adauga</button>
    </form>
</body>
</html>
