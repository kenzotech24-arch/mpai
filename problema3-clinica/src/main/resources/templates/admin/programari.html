<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Admin - Programari</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-4">
    <h2>Receptie / Administrator - Programari</h2>
    <a href="/home" class="btn btn-secondary btn-sm mb-3">Acasa</a>

    <div th:if="${mesaj}" class="alert alert-success" th:text="${mesaj}"></div>

    <form method="get" action="/admin/programari" class="row g-2 mb-4">
        <div class="col-md-3">
            <input type="email" name="email" class="form-control" placeholder="Filtreaza dupa email pacient" th:value="${filterEmail}"/>
        </div>
        <div class="col-md-3">
            <input type="text" name="medic" class="form-control" placeholder="Filtreaza dupa medic" th:value="${filterMedic}"/>
        </div>
        <div class="col-md-3">
            <select name="status" class="form-select">
                <option value="">Toate statusurile</option>
                <option th:each="s : ${statusuri}" th:value="${s}" th:text="${s}" th:selected="${s.name() == filterStatus}"></option>
            </select>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary">Filtreaza</button>
        </div>
    </form>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>#</th><th>Pacient</th><th>Email</th><th>Medic</th><th>Specialitate</th><th>Data si Ora</th><th>Motiv</th><th>Status</th><th>Schimba Status</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${programari}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.pacientNume}"></td>
            <td th:text="${p.pacientEmail}"></td>
            <td th:text="${p.medicNume}"></td>
            <td th:text="${p.medicSpecialitate}"></td>
            <td th:text="${p.dataOra}"></td>
            <td th:text="${p.motiv}"></td>
            <td><span class="badge bg-primary" th:text="${p.status}"></span></td>
            <td>
                <form method="post" th:action="@{/admin/status/{id}(id=${p.id})}" class="d-flex gap-1">
                    <select name="status" class="form-select form-select-sm">
                        <option th:each="s : ${statusuri}" th:value="${s}" th:text="${s}" th:selected="${s == p.status}"></option>
                    </select>
                    <button type="submit" class="btn btn-warning btn-sm">OK</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
