<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Admin - Programari</title>
</head>
<body>
    <h2>Receptie / Administrator - Programari</h2>
    <a href="/home">Acasa</a>

    <br/><br/>
    <p th:if="${mesaj}" th:text="${mesaj}"></p>

    <form method="get" action="/admin/programari">
        <input type="email" name="email" placeholder="Filtreaza dupa email pacient" th:value="${filterEmail}"/>
        <input type="text" name="medic" placeholder="Filtreaza dupa medic" th:value="${filterMedic}"/>
        <select name="status">
            <option value="">Toate statusurile</option>
            <option th:each="s : ${statusuri}" th:value="${s}" th:text="${s}" th:selected="${s.name() == filterStatus}"></option>
        </select>
        <button type="submit">Filtreaza</button>
    </form>

    <br/>
    <table border="1">
        <thead>
            <tr>
                <th>#</th>
                <th>Pacient</th>
                <th>Email</th>
                <th>Medic</th>
                <th>Specialitate</th>
                <th>Data si Ora</th>
                <th>Motiv</th>
                <th>Status</th>
                <th>Schimba Status</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${programari}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.pacientNume}"></td>
                <td th:text="${p.pacientEmail}"></td>
                <td th:text="${p.medicNume}"></td>
                <td th:text="${p.medicSpecialitate}"></td>
                <td th:text="${p.dataOra}"></td>
                <td th:text="${p.motiv}"></td>
                <td th:text="${p.status}"></td>
                <td>
                    <form method="post" th:action="@{/admin/status/{id}(id=${p.id})}">
                        <select name="status">
                            <option th:each="s : ${statusuri}" th:value="${s}" th:text="${s}" th:selected="${s == p.status}"></option>
                        </select>
                        <button type="submit">OK</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
