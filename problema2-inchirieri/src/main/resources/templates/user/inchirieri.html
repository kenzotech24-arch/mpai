<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Inchirierile mele</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-4">
    <h2>Zona Utilizator</h2>
    <a href="/home" class="btn btn-secondary btn-sm mb-3">Acasa</a>

    <form method="get" action="/user" class="mb-4">
        <div class="input-group">
            <input type="email" name="email" class="form-control" placeholder="Introduceti email-ul dvs." th:value="${email}"/>
            <button class="btn btn-primary" type="submit">Cauta cereri</button>
        </div>
    </form>

    <div th:if="${mesaj}" class="alert alert-success" th:text="${mesaj}"></div>

    <div th:if="${email != null}">
        <div th:if="${notificari != null and !notificari.empty}" class="mb-3">
            <h5>Notificari</h5>
            <ul class="list-group mb-3">
                <li class="list-group-item list-group-item-info" th:each="n : ${notificari}">
                    <span th:text="${n.mesaj}"></span>
                    <small class="text-muted float-end" th:text="${n.data}"></small>
                </li>
            </ul>
        </div>

        <h5>Cererile mele de inchiriere</h5>
        <table class="table table-bordered">
            <thead>
            <tr>
                <th>#</th><th>Echipament</th><th>De la</th><th>Pana la</th><th>Scop</th><th>Status</th><th>Actiune</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="i : ${inchirieri}">
                <td th:text="${i.id}"></td>
                <td th:text="${i.echipamentNume}"></td>
                <td th:text="${i.dataStart}"></td>
                <td th:text="${i.dataFinal}"></td>
                <td th:text="${i.scop}"></td>
                <td><span class="badge bg-info" th:text="${i.status}"></span></td>
                <td>
                    <form th:if="${i.status.name() == 'CERUUTA'}" method="post" th:action="@{/user/anuleaza/{id}(id=${i.id})}">
                        <input type="hidden" name="email" th:value="${email}"/>
                        <button class="btn btn-danger btn-sm" type="submit">Anuleaza</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <h5 class="mt-4">Cerere noua de inchiriere</h5>
        <form method="post" action="/user/adauga">
            <div class="mb-2">
                <input type="text" name="utilizatorNume" class="form-control" placeholder="Numele dvs." required/>
            </div>
            <div class="mb-2">
                <input type="email" name="utilizatorEmail" class="form-control" placeholder="Email" th:value="${email}" required/>
            </div>
            <div class="mb-2">
                <select name="echipamentId" class="form-select" required>
                    <option value="">-- Selectati echipamentul --</option>
                    <option th:each="e : ${echipamente}" th:value="${e.id}" th:text="${e.nume}"></option>
                </select>
            </div>
            <div class="mb-2 row">
                <div class="col">
                    <input type="date" name="dataStart" class="form-control" required/>
                </div>
                <div class="col">
                    <input type="date" name="dataFinal" class="form-control" required/>
                </div>
            </div>
            <div class="mb-2">
                <input type="text" name="scop" class="form-control" placeholder="Scopul inchirierii" required/>
            </div>
            <button type="submit" class="btn btn-success">Trimite cererea</button>
        </form>
    </div>
</div>
</body>
</html>
