<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Admin - Comenzi</title>
</head>
<body>
    <h2>Administrator - Comenzi</h2>
    <a href="/home">Acasa</a>

    <br/><br/>
    <p th:if="${mesaj}" th:text="${mesaj}"></p>

    <form method="get" action="/admin/comenzi">
        <input type="email" name="email" placeholder="Filtreaza dupa email" th:value="${filterEmail}"/>
        <select name="status">
            <option value="">Toate statusurile</option>
            <option th:each="s : ${statusuri}" th:value="${s}" th:text="${s}" th:selected="${s.name() == filterStatus}"></option>
        </select>
        <button type="submit">Filtreaza</button>
    </form>

    <br/>
    <table border="1">
        <thead>
            <tr>
                <th>#</th>
                <th>Client</th>
                <th>Email</th>
                <th>Produse</th>
                <th>Data</th>
                <th>Status</th>
                <th>Total</th>
                <th>Schimba Status</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${comenzi}">
                <td th:text="${c.id}"></td>
                <td th:text="${c.clientNume}"></td>
                <td th:text="${c.clientEmail}"></td>
                <td th:text="${c.produse}"></td>
                <td th:text="${c.dataComanda}"></td>
                <td th:text="${c.status}"></td>
                <td th:text="${c.total} + ' RON'"></td>
                <td>
                    <form th:if="${c.status.name() != 'LIVRATA' and c.status.name() != 'ANULATA'}"
                          method="post" th:action="@{/admin/status/{id}(id=${c.id})}">
                        <select name="status">
                            <option th:each="s : ${statusuri}" th:value="${s}" th:text="${s}" th:selected="${s == c.status}"></option>
                        </select>
                        <button type="submit">OK</button>
                    </form>
                    <span th:if="${c.status.name() == 'LIVRATA' or c.status.name() == 'ANULATA'}" th:text="${c.status}"></span>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
