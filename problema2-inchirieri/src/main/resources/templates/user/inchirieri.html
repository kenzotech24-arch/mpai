<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Inchirierile mele</title>
</head>
<body>
    <h2>Zona Utilizator</h2>
    <a href="/home">Acasa</a>

    <br/><br/>
    <form method="get" action="/user">
        <input type="email" name="email" placeholder="Introduceti email-ul dvs." th:value="${email}"/>
        <button type="submit">Cauta cereri</button>
    </form>

    <p th:if="${mesaj}" th:text="${mesaj}"></p>

    <div th:if="${email != null}">

        <div th:if="${notificari != null and !notificari.empty}">
            <h4>Notificari</h4>
            <ul>
                <li th:each="n : ${notificari}">
                    <span th:text="${n.mesaj}"></span> -
                    <small th:text="${n.data}"></small>
                </li>
            </ul>
        </div>

        <h4>Cererile mele de inchiriere</h4>
        <table border="1">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Echipament</th>
                    <th>De la</th>
                    <th>Pana la</th>
                    <th>Scop</th>
                    <th>Status</th>
                    <th>Actiune</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="i : ${inchirieri}">
                    <td th:text="${i.id}"></td>
                    <td th:text="${i.echipamentNume}"></td>
                    <td th:text="${i.dataStart}"></td>
                    <td th:text="${i.dataFinal}"></td>
                    <td th:text="${i.scop}"></td>
                    <td th:text="${i.status}"></td>
                    <td>
                        <form th:if="${i.status.name() == 'CERUUTA'}" method="post" th:action="@{/user/anuleaza/{id}(id=${i.id})}">
                            <input type="hidden" name="email" th:value="${email}"/>
                            <button type="submit">Anuleaza</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <h4>Cerere noua de inchiriere</h4>
        <form method="post" action="/user/adauga">
            <input type="text" name="utilizatorNume" placeholder="Numele dvs." required/>
            <br/>
            <input type="email" name="utilizatorEmail" placeholder="Email" th:value="${email}" required/>
            <br/>
            <select name="echipamentId" required>
                <option value="">-- Selectati echipamentul --</option>
                <option th:each="e : ${echipamente}" th:value="${e.id}" th:text="${e.nume}"></option>
            </select>
            <br/>
            Data start: <input type="date" name="dataStart" required/>
            Data final: <input type="date" name="dataFinal" required/>
            <br/>
            <input type="text" name="scop" placeholder="Scopul inchirierii" required/>
            <br/>
            <button type="submit">Trimite cererea</button>
        </form>

    </div>
</body>
</html>
