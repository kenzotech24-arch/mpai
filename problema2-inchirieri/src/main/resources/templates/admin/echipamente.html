<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Admin - Echipamente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-4">
    <h2>Administrator - Echipamente</h2>
    <div class="mb-3">
        <a href="/home" class="btn btn-secondary btn-sm">Acasa</a>
        <a href="/admin/inchirieri" class="btn btn-primary btn-sm">Cereri Inchiriere</a>
    </div>

    <div th:if="${mesaj}" class="alert alert-success" th:text="${mesaj}"></div>

    <table class="table table-bordered mb-4">
        <thead class="table-dark">
        <tr>
            <th>#</th><th>Nume</th><th>Descriere</th><th>Disponibil</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="e : ${echipamente}">
            <td th:text="${e.id}"></td>
            <td th:text="${e.nume}"></td>
            <td th:text="${e.descriere}"></td>
            <td>
                <span th:if="${e.disponibil}" class="badge bg-success">Da</span>
                <span th:unless="${e.disponibil}" class="badge bg-danger">Nu</span>
            </td>
        </tr>
        </tbody>
    </table>

    <h5>Adauga echipament nou</h5>
    <form method="post" action="/admin/echipamente/adauga">
        <div class="mb-2">
            <input type="text" name="nume" class="form-control" placeholder="Nume echipament" required/>
        </div>
        <div class="mb-2">
            <input type="text" name="descriere" class="form-control" placeholder="Descriere" required/>
        </div>
        <div class="mb-2 form-check">
            <input type="checkbox" name="disponibil" value="true" class="form-check-input" id="disponibil" checked/>
            <label class="form-check-label" for="disponibil">Disponibil</label>
        </div>
        <button type="submit" class="btn btn-success">Adauga</button>
    </form>
</div>
</body>
</html>
