<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Programarile mele</title>
</head>
<body>
    <h2>Zona Pacient</h2>
    <a href="/home">Acasa</a>

    <br/><br/>
    <form method="get" action="/pacient">
        <input type="email" name="email" placeholder="Introduceti email-ul dvs." th:value="${email}"/>
        <button type="submit">Cauta programari</button>
    </form>

    <p th:if="${mesaj}" th:text="${mesaj}"></p>

    <div th:if="${email != null}">

        <div th:if="${notificari != null and !notificari.empty}">
            <h4>Notificari</h4>
            <ul>
                <li th:each="n : ${notificari}">
                    <span th:text="${n.mesaj}"></span> -
                    <small th:text="${n.data}"></small>
                </li>
            </ul>
        </div>

        <h4>Programarile mele</h4>
        <table border="1">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Medic</th>
                    <th>Specialitate</th>
                    <th>Data si Ora</th>
                    <th>Motiv</th>
                    <th>Status</th>
                    <th>Actiune</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${programari}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.medicNume}"></td>
                    <td th:text="${p.medicSpecialitate}"></td>
                    <td th:text="${p.dataOra}"></td>
                    <td th:text="${p.motiv}"></td>
                    <td th:text="${p.status}"></td>
                    <td>
                        <form th:if="${p.status.name() == 'SOLICITATA' or p.status.name() == 'CONFIRMATA'}"
                              method="post" th:action="@{/pacient/anuleaza/{id}(id=${p.id})}">
                            <input type="hidden" name="email" th:value="${email}"/>
                            <button type="submit">Anuleaza</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <h4>Programare noua</h4>
        <form method="post" action="/pacient/adauga">
            <input type="text" name="pacientNume" placeholder="Numele dvs." required/>
            <br/>
            <input type="email" name="pacientEmail" placeholder="Email" th:value="${email}" required/>
            <br/>
            <select name="medicId" required>
                <option value="">-- Selectati medicul --</option>
                <option th:each="m : ${medici}" th:value="${m.id}" th:text="${m.nume + ' - ' + m.specialitate}"></option>
            </select>
            <br/>
            Data si ora: <input type="datetime-local" name="dataOra" required/>
            <br/>
            <input type="text" name="motiv" placeholder="Motivul programarii" required/>
            <br/>
            <button type="submit">Solicita programare</button>
        </form>

    </div>
</body>
</html>
